<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:380px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.container h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-box{
    margin-bottom:18px;
}

.input-box label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    text-decoration:none;
    color:#007BFF;
}
</style>

</head>
<body>

<div class="container">

<h2>Login</h2>

<form id="loginForm">

<div class="input-box">
<label>Email</label>
<input type="email" id="email" placeholder="salmanshabana2006@gmail.com required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" id="password" placeholder="salman123" required>
</div>

<div class="input-box">
<label>Upload Resume</label>
<input type="file" id="resume" accept=".pdf,.doc,.docx" required>
</div>

<button type="submit">Login</button>

<p>Don't have an account? <a href="#">Register</a></p>

</form>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
let resume=document.getElementById("resume").files[0];

if(resume){

alert(
"Login Successful!\n\n"+
"Email: "+email+
"\nResume: "+resume.name
);

}else{

alert("Please upload your resume.");

}

});
</script>

</body>
</html>
